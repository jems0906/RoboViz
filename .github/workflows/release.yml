name: Release Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/web:latest

      - name: Build and push Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agents/python-agent
          file: ./Dockerfile.agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/agent:latest
