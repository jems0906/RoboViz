services:
  postgres:
    image: postgres:16
    container_name: roboviz-postgres
    restart: unless-stopped
    cpus: "1.50"
    mem_limit: 1g
    environment:
      POSTGRES_DB: roboviz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roboviz"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: roboviz-minio
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: 768m
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  createbucket:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/roboviz-raw;
      /usr/bin/mc anonymous set download local/roboviz-raw;
      exit 0;
      "
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: roboviz-api
    restart: unless-stopped
    cpus: "1.50"
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/roboviz
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: roboviz-raw
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: roboviz-web
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 256m
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  agent-sim:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: roboviz-agent-sim
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: 256m
    depends_on:
      api:
        condition: service_healthy
    environment:
      ENDPOINT: ws://api:4000/ws/ingest
      ROBOT_ID: robot-sim-01
      NAME: "Warehouse Scout"
      LOCATION: dock-a
    logging:
      options:
        max-size: "10m"
        max-file: "3"
